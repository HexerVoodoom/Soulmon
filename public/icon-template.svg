<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2bff95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <filter id="pixelate">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0" />
    </filter>
  </defs>
  
  <!-- Rounded Rectangle Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Simple Pixel-Style "D" Icon -->
  <!-- Outer Border -->
  <rect x="140" y="120" width="232" height="272" fill="#0a0a0a" filter="url(#pixelate)"/>
  
  <!-- Letter D Shape (Pixel Style) -->
  <g fill="#2bff95">
    <!-- Vertical Bar -->
    <rect x="156" y="136" width="48" height="240"/>
    <!-- Top Horizontal -->
    <rect x="204" y="136" width="96" height="48"/>
    <!-- Bottom Horizontal -->
    <rect x="204" y="328" width="96" height="48"/>
    <!-- Right Vertical -->
    <rect x="300" y="184" width="48" height="144"/>
    <!-- Top-Right Corner -->
    <rect x="300" y="136" width="48" height="48" opacity="0.5"/>
    <!-- Bottom-Right Corner -->
    <rect x="300" y="328" width="48" height="48" opacity="0.5"/>
  </g>
  
  <!-- Pixel Heart Detail (representing care/productivity) -->
  <g fill="#ff2b95" transform="translate(360, 400)">
    <rect x="0" y="8" width="16" height="16"/>
    <rect x="32" y="8" width="16" height="16"/>
    <rect x="-8" y="24" width="16" height="16"/>
    <rect x="16" y="24" width="16" height="16"/>
    <rect x="48" y="24" width="16" height="16"/>
    <rect x="0" y="40" width="16" height="16"/>
    <rect x="32" y="40" width="16" height="16"/>
    <rect x="16" y="56" width="16" height="16"/>
  </g>
</svg>
